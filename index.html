<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Kamu ❤️</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
120deg,
#ffd6e8,
#dff9ff,
#fff2b8,
#eadcff
);

background-size:400% 400%;

animation:bg 12s infinite;

font-family:'Poppins',sans-serif;

}



@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}




.card{


width:90%;
max-width:450px;

padding:40px 30px;


background:rgba(255,255,255,.55);

backdrop-filter:blur(18px);


border-radius:30px;


text-align:center;


box-shadow:
0 20px 40px rgba(0,0,0,.12);


animation:floatCard 4s infinite;


z-index:10;


}



@keyframes floatCard{


0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-12px);

}


}




h1{

font-family:'Playfair Display',serif;

font-size:38px;

color:#ff5c93;

margin-bottom:15px;

}



p{

font-size:16px;

line-height:1.8;

color:#555;

}





input{


width:70%;


padding:13px;


border:none;

border-radius:30px;

outline:none;

text-align:center;


}



button{


margin-top:20px;

padding:12px 28px;

border:none;

border-radius:30px;


background:#ff6fa3;

color:white;


cursor:pointer;


transition:.3s;


}



button:hover{

transform:scale(1.1);

}




.hidden{

display:none;

}





/* KUCING */


.cat{


font-size:110px;

cursor:pointer;

display:inline-block;


animation:catMove 1.5s infinite;


}




@keyframes catMove{


0%,100%{

transform:
translateY(0)
rotate(-5deg);

}


50%{

transform:
translateY(-20px)
rotate(5deg);

}


}






/* typing */


#typing{


min-height:140px;

}



.fadeText{

animation:show 1.5s forwards;

}



@keyframes show{


from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

transform:translateY(0);

}


}






/* love */


.love{


position:absolute;


font-size:28px;


animation:loveFly linear forwards;


}



@keyframes loveFly{


0%{


bottom:-10%;

opacity:0;

transform:
scale(.5)
rotate(0deg);

}



20%{

opacity:1;

}



100%{


bottom:120%;


opacity:0;


transform:
scale(2)
rotate(360deg);


}


}






/* kucing ending */


.jumpCat{


position:absolute;

bottom:-100px;

font-size:60px;


animation:
jump 3s infinite;


}



@keyframes jump{


0%,100%{

bottom:-100px;

transform:rotate(-10deg);

}


50%{

bottom:75%;

transform:rotate(20deg);

}


}







/* bintang */


.star{


position:absolute;

font-size:20px;

animation:
starMove 6s linear infinite;


}



@keyframes starMove{


from{

top:100%;

opacity:0;

}


50%{

opacity:1;

}


to{

top:-20%;

opacity:0;

}


}


</style>


</head>


<body>




<audio id="music" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>





<!-- LOGIN -->


<div class="card" id="login">


<h1>Secret ✨</h1>


<p>

Masukkan PIN kecil kita ❤️

</p>



<input
id="pin"
placeholder="PIN"
>


<br>


<button onclick="check()">

Buka

</button>


<p id="error"></p>


</div>






<!-- INTRO -->


<div class="card hidden" id="intro">


<h1>Hai kamu 🐾</h1>


<div class="cat" onclick="pet()">

🐱

</div>


<p id="catText">

Sentuh kucingnya dulu

</p>


</div>







<!-- ISI -->


<div class="card hidden" id="main">


<h1>

Untuk Kamu ❤️

</h1>



<p id="typing"></p>




<button onclick="playMusic()">

🎵 Musik

</button>



<br>



<button onclick="finish()">

✨ Lanjut

</button>



</div>








<script>




function check(){


if(pin.value=="27032026"){


login.style.display="none";


intro.classList.remove("hidden");


}

else{


error.innerHTML="PIN salah 😿";


}


}






function pet(){


catText.innerHTML=
"Meong~ kucing senang 😺❤️";



setTimeout(()=>{


intro.style.display="none";


main.classList.remove("hidden");


typing();



},1200);


}







function playMusic(){


document
.getElementById("music")
.play();


}








let text =

"Aku nggak janji semuanya selalu sempurna, tapi aku mau terus belajar, tumbuh, dan menghargai setiap hal kecil tentang kamu. Terima kasih sudah hadir 🤍";



let i=0;



function typing(){


if(i < text.length){


document
.getElementById("typing")
.innerHTML += text.charAt(i);



i++;


setTimeout(typing,45);


}


}








function finish(){



document.body.innerHTML+=`


<div class="card">

<h1>

LOVE YOU ❤️

</h1>


<p>

Semoga kamu selalu punya alasan untuk tersenyum 🐱

</p>


</div>


`;





for(let i=0;i<70;i++){


let love=document.createElement("div");


love.className="love";


love.innerHTML="❤️";


love.style.left=
Math.random()*100+"%";


love.style.animationDuration=

(2+Math.random()*4)+"s";


document.body.appendChild(love);


}






for(let i=0;i<40;i++){


let cat=document.createElement("div");


cat.className="jumpCat";


cat.innerHTML="🐈";


cat.style.left=
Math.random()*100+"%";


cat.style.animationDelay=
Math.random()*3+"s";


document.body.appendChild(cat);


}



}







for(let i=0;i<40;i++){


let star=document.createElement("div");


star.className="star";


star.innerHTML="✨";


star.style.left=
Math.random()*100+"%";


star.style.animationDelay=
Math.random()*5+"s";


document.body.appendChild(star);


}



</script>



</body>
</html>
